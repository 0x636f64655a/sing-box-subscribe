name: Build & Push Docker Image

on:
  release:
    types: [released]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      docker_user: ${{ secrets.DOCKERHUB_USERNAME }}
      docker_pat: ${{ secrets.DOCKERHUB_PAT }}
      docker_repo: ${{ github.repository }}
      release_version: ${{ github.event.release.tag_name }}
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: $docker_user
          password: $docker_pat
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Release Version Format
        run: |
          if [[ ! "$release_version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release version format!" && exit 1
          fi

      - name: Build And Push
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: "$docker_user/$docker_repo:$release_version,$docker_user/$docker_repo:latest"
          cache-from: type=registry,ref=$docker_user/$docker_repo:cache
          cache-to: type=registry,ref=$docker_user/$docker_repo:cache,mode=max
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
